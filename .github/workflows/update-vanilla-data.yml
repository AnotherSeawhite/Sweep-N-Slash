name: Update vanilla data

on:
    schedule:
        - cron: '0 5 * * *'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Fetch latest player.json
              run: deno run --allow-net --allow-write scripts/update-vanilla-data.ts

            - name: Format with Prettier
              run: npx --yes prettier --write vanilla_data/

            - name: Commit if changed
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add vanilla_data/bp/entities/player.json
                  git diff --staged --quiet || (git commit -m "chore: update vanilla player.json" && git push origin main)
